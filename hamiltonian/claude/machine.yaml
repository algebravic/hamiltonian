# machine.yaml — written by tune_params.py for M3 Pro (Mac14,6 / Mac15,x)
# Run: python3 tune_params.py --output . to regenerate for your machine.
# ham_dp_c.py reads this file in _derive_build_constants and passes all
# SM_ values to gcc via -D flags; nothing is hardcoded in the C source.

SM_NTHREADS: 6
SM_WORKER_CAP: 16777216       # 16M entries = 384MB per worker buf
SM_RBUF_SIZE: 32
SM_BB_BUF: 16
SM_BB_KSTACK: 32
SM_EXT_STREAM_BUF: 1024       # 24KB/stream floor; dynamic formula overrides
SM_SLC_BYTES: 12582912        # 12MB SLC
SM_PAR_MERGE_THRESH: 50000000
SM_STEAL_FACTOR: 32

# Hardware info (informational only)
_cpu: Apple M3 Pro
_ram_gb: 36
_l1_kb: 192
_l2_kb: 4096
_slc_mb: 12
